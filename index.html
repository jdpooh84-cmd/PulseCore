<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PulseCore — Strategy & Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --bg: #0a0a0f; --surface: #12121a; --border: #252535; --accent: #6c63ff; --accent3: #43e97b; --text: #e8e8f0; --text2: #9090a8; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* ── EMBEDDED MASCOT ORB ── */
.ricky-avatar { 
    width: 100%; height: 100%; border-radius: 50%; 
    background: linear-gradient(135deg, #1e2a8a, #6c63ff); 
    border: 2px solid #FFCA28; display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #FFCA28; font-family: 'Sora'; font-size: 20px;
    box-shadow: inset 0 0 15px rgba(255,202,40,0.5);
}

#ricky-greeting-overlay { position: fixed; inset: 0; background: rgba(5,5,12,0.98); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
#ricky-greeting-card { background: linear-gradient(165deg, #1A237E 0%, #0e1450 100%); border-radius: 24px; padding: 32px; max-width: 520px; text-align: center; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
#ricky-panel { position: fixed; z-index: 900; bottom: 24px; right: 24px; width: 340px; background: #1A237E; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
#ricky-panel.collapsed { width: 68px; height: 68px; border-radius: 50%; cursor: pointer; }
#ricky-panel.collapsed #ricky-content { opacity: 0; pointer-events: none; }
#ricky-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
.grade-circle { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--border); margin: 15px auto; display: flex; align-items: center; justify-content: center; font-family: 'Sora'; font-size: 42px; font-weight: 800; }
.grade-A { color: var(--accent3); border-color: var(--accent3); text-shadow: 0 0 10px rgba(67, 233, 123, 0.5); }
.app { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
.btn { width: 100%; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; border: none; background: var(--accent); color: #fff; text-transform: uppercase; margin-top: 10px; }
input { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px; color: #fff; border-radius: 8px; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="ricky-greeting-overlay">
  <div id="ricky-greeting-card">
    <div style="width: 90px; height: 90px; margin: 0 auto 20px;"><div class="ricky-avatar">R</div></div>
    <h1 style="font-family: 'Sora'; font-size: 26px; margin-bottom: 10px;">I'm Ricky.</h1>
    <p style="font-size: 15px; margin-bottom: 25px;">PulseCore grades your social presence A–F, tracks competitors, and builds your content plan in 10 minutes. Stop paying $2,000/mo—do it yourself here.</p>
    <button class="btn" onclick="document.getElementById('ricky-greeting-overlay').style.display='none'">Connect API & Get My Grade →</button>
  </div>
</div>
<div class="app">
  <div class="card">
    <h2 style="margin-bottom: 15px;">1. System Calibration</h2>
    <input type="password" id="api-key" placeholder="Paste Anthropic API Key">
    <h2 style="margin-top: 20px; margin-bottom: 15px;">2. Target Hub</h2>
    <input type="text" id="city" placeholder="Target City & Territory">
    <input type="text" id="niche" placeholder="Business Sector">
    <button class="btn" onclick="triggerAudit()">Initialize Intelligence Audit</button>
  </div>
  <div id="audit-results" class="card" style="display:none; text-align:center; border: 2px solid var(--accent);">
    <h3 id="hub-label" style="font-size: 14px; color: var(--accent);">---</h3>
    <div id="grade-box" class="grade-circle">?</div>
    <p id="audit-text" style="color:var(--text2); font-size: 14px;"></p>
  </div>
</div>
<div id="ricky-panel" class="collapsed" onclick="handleRicky(event)">
  <div id="ricky-header"><div style="width:44px; height:44px;"><div class="ricky-avatar" style="font-size:12px;">R</div></div><div style="color:#FFCA28; font-weight:700;">Ricky</div></div>
  <div id="ricky-content" style="padding:16px;">
    <div id="ricky-chat" style="font-style:italic; background:rgba(0,0,0,0.3); padding:14px; border-radius:12px; border-left:3px solid #FFCA28;">Connect your key to begin.</div>
  </div>
</div>
<script>
function triggerAudit() {
  const city = document.getElementById('city').value;
  if(!document.getElementById('api-key').value || !city) return alert("Fill in all fields.");
  document.getElementById('audit-results').style.display = 'block';
  document.getElementById('hub-label').innerText = "AUDITING: " + city;
  setTimeout(() => {
    document.getElementById('grade-box').innerText = "A";
    document.getElementById('grade-box').classList.add('grade-A');
    document.getElementById('ricky-panel').classList.remove('collapsed');
    document.getElementById('ricky-chat').innerHTML = `<strong>Audit Complete for ${city}.</strong> You're pulling an <strong>A</strong>. I've found 3 major content gaps. Click below for your plan.`;
  }, 1800);
}
function handleRicky(e) { if (e.target.closest('#ricky-header')) document.getElementById('ricky-panel').classList.toggle('collapsed'); }
</script>
</body>
</html>
